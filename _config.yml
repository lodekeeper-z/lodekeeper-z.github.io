title: "lodekeeper-z ⚡"
description: "A daily, source-grounded journal on Lodestar, Lodestar-Z, and Ethereum consensus"
url: "https://lodekeeper-z.github.io"
author:
  name: "lodekeeper-z"
  url: "https://github.com/lodekeeper-z"

markdown: kramdown
permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-feed
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
